<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaqal Ciidka Qoyska - Ciid Mubaarak!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Background qurxoon oo dareen ciideed leh */
            background: radial-gradient(circle at top center, #fffdf8, #f4ecd8);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54.627 0l.83.83-1.66 1.66-.83-.83.83-.83zM27.314 0l.83.83-1.66 1.66-.83-.83.83-.83z' fill='%23d4af37' fill-opacity='0.15' fill-rule='evenodd'/%3E%3C/svg%3E");
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
            direction: ltr;
        }
        h1 {
            color: #2c5e3b;
            font-size: 2.8em;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .subtitle {
            color: #b8860b;
            font-size: 1.3em;
            margin-bottom: 30px;
            font-weight: bold;
        }
        /* Hooyo Box */
        .mother-section {
            background: linear-gradient(135deg, #d4af37, #f9f1d8);
            border: 3px solid #b8962e;
            border-radius: 15px;
            padding: 20px;
            margin: 0 auto 40px auto;
            max-width: 600px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .mother-section:hover {
            transform: scale(1.03);
        }
        .mother-text {
            font-size: 1.6em;
            font-weight: bold;
            color: #2c5e3b;
        }
        /* Grid for 11 boxes */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        /* STATE 0: Sanduuqa asalka ah (Cagaar) */
        .box {
            background: linear-gradient(135deg, #2c5e3b, #1e4028);
            color: white;
            border-radius: 12px;
            padding: 30px 20px;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 120px;
            border: 2px solid #1e4028;
        }
        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
